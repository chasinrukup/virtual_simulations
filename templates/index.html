<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Network Simulation Lab</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header>
    <div class="header-title">
      <span class="header-icon">&#9652;</span>
      Virtual Network Simulation Lab
    </div>
    <div class="header-status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Idle</span>
    </div>
  </header>

  <!-- ── Main layout ────────────────────────────────────────────────────── -->
  <div class="layout">

    <!-- Left: Scenario library -->
    <aside class="sidebar">
      <div class="sidebar-heading">Prebuilt Scenarios</div>
      <div id="scenarioList" class="scenario-list">
        <div class="loading">Loading scenarios...</div>
      </div>
    </aside>

    <!-- Right: main content -->
    <main class="content">

      <!-- Topology -->
      <section class="panel" id="topologyPanel">
        <div class="panel-heading">Network Topology</div>
        <div id="topologyView" class="topology-empty">
          Select a scenario and click Deploy to begin.
        </div>
      </section>

      <!-- VM Status -->
      <section class="panel" id="statusPanel">
        <div class="panel-heading">
          VM Status
          <div class="panel-actions">
            <button class="btn btn-warn" id="btnStop" onclick="stopAll()" disabled>Stop All</button>
            <button class="btn btn-danger" id="btnDelete" onclick="teardown()" disabled>Delete Lab</button>
          </div>
        </div>
        <div id="vmStatus" class="vm-status-empty">No lab deployed.</div>
      </section>

      <!-- Deployment Log -->
      <section class="panel" id="logPanel">
        <div class="panel-heading">
          Deployment Log
          <button class="btn btn-ghost" onclick="clearLog()">Clear</button>
        </div>
        <div id="logOutput" class="log-output"></div>
      </section>

    </main>
  </div>

  <!-- ── Deploy modal ───────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="deployModal" style="display:none">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Deploy Scenario</div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modalDeployBtn" onclick="confirmDeploy()">Deploy</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
